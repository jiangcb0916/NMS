<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#101518">
    <title>{% block title %}网络管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css', v=config.VERSION) }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/workbench.css', v=config.VERSION) }}" rel="stylesheet">
</head>
<body class="app-body">
    <a class="skip-link" href="#main-content">跳到主内容</a>
    <header class="mobile-topbar">
        <button class="mobile-nav-toggle" id="mobile-nav-toggle" type="button" aria-label="打开导航" aria-controls="app-sidebar" aria-expanded="false">
            <i class="bi bi-list" aria-hidden="true"></i>
        </button>
        <div>
            <div class="mobile-title">网络管理系统</div>
            <div class="mobile-subtitle">运维控制台 · {{ config.VERSION }}</div>
        </div>
    </header>
    <button class="sidebar-scrim" id="sidebar-scrim" type="button" aria-label="关闭导航"></button>
    <div class="app-shell">
        <aside class="sidebar" id="app-sidebar" aria-label="主导航">
            <div class="brand">
                <div class="brand-mark"><i class="bi bi-shield-check" aria-hidden="true"></i></div>
                <div class="brand-copy">
                    <div class="brand-title">网络管理系统</div>
                    <div class="brand-version">运维控制台 · {{ config.VERSION }}</div>
                </div>
                <button class="sidebar-collapse-toggle" id="sidebar-collapse-toggle" type="button" aria-label="收起侧栏" aria-controls="app-sidebar" aria-expanded="true" title="收起侧栏">
                    <i class="bi bi-chevron-double-left" aria-hidden="true"></i>
                </button>
            </div>

            <nav class="nav-list">
                <div class="nav-section">
                    <div class="nav-section-title">总览</div>
                    <a class="nav-item active" href="#dashboard" id="dashboard-nav" data-section="dashboard" aria-current="page" title="运行总览">
                        <i class="bi bi-speedometer2" aria-hidden="true"></i>
                        <span>运行总览</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">网络监控</div>
                    <a class="nav-item" href="#firewall-bandwidth" id="firewall-bandwidth-nav" data-section="firewall-bandwidth" title="防火墙带宽">
                        <i class="bi bi-graph-up" aria-hidden="true"></i>
                        <span>防火墙带宽</span>
                    </a>
                    <a class="nav-item" href="#traffic-analysis" id="traffic-analysis-nav" data-section="traffic-analysis" title="流量分析">
                        <i class="bi bi-bar-chart-line" aria-hidden="true"></i>
                        <span>流量分析</span>
                    </a>
                    <a class="nav-item" href="#osdwan" id="osdwan-nav" data-section="osdwan" title="OSDWAN 监控">
                        <i class="bi bi-cloud-arrow-up" aria-hidden="true"></i>
                        <span>OSDWAN 监控</span>
                    </a>
                    <a class="nav-item" href="#topology" id="topology-nav" data-section="topology" title="网络拓扑">
                        <i class="bi bi-bezier2" aria-hidden="true"></i>
                        <span>网络拓扑</span>
                    </a>
                    <a class="nav-item" href="#switches" id="switches-nav" data-section="switches" title="交换机监控">
                        <i class="bi bi-diagram-3" aria-hidden="true"></i>
                        <span>交换机监控</span>
                    </a>
                    <a class="nav-item" href="#wireless" id="wireless-nav" data-section="status" title="无线控制器">
                        <i class="bi bi-activity" aria-hidden="true"></i>
                        <span>无线控制器</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">准入资产</div>
                    <a class="nav-item" href="#devices" id="devices-nav" data-section="access" title="设备列表">
                        <i class="bi bi-hdd-network" aria-hidden="true"></i>
                        <span>设备列表</span>
                    </a>
                    <a class="nav-item" href="#clients" id="clients-nav" data-section="clients" title="客户端列表">
                        <i class="bi bi-pc-display" aria-hidden="true"></i>
                        <span>客户端列表</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">系统管理</div>
                    <a class="nav-item" href="#users" id="users-nav" title="用户管理">
                        <i class="bi bi-people" aria-hidden="true"></i>
                        <span>用户管理</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="current-user">
                    <i class="bi bi-person-circle" aria-hidden="true"></i>
                    <div class="current-user-copy">
                        <div id="current-user-name">-</div>
                        <div id="current-user-role">-</div>
                    </div>
                    <button class="logout-icon-button" id="logout-button" type="button" title="退出" aria-label="退出登录">
                        <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-panel" id="main-content" tabindex="-1">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="toast-stack" id="toast-stack" role="status" aria-live="polite" aria-atomic="true"></div>
    <script src="{{ url_for('static', filename='js/app.js', v=config.VERSION) }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
