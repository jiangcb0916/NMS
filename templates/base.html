<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}网络管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <i class="bi bi-shield-check"></i>
                <div>
                    <div class="brand-title">网络管理系统</div>
                    <div class="brand-version">{{ config.VERSION }}</div>
                </div>
            </div>

            <nav class="nav-list">
                <a class="nav-item active" href="#" id="dashboard-nav" data-section="dashboard">
                    <i class="bi bi-speedometer2"></i>
                    <span>仪表盘</span>
                </a>
                <a class="nav-item" href="#" id="firewall-bandwidth-nav" data-section="firewall-bandwidth">
                    <i class="bi bi-graph-up"></i>
                    <span>防火墙带宽</span>
                </a>
                <a class="nav-item" href="#" id="wireless-nav" data-section="status">
                    <i class="bi bi-activity"></i>
                    <span>无线控制器</span>
                </a>
                <a class="nav-item" href="#" id="devices-nav" data-section="access">
                    <i class="bi bi-hdd-network"></i>
                    <span>设备列表</span>
                </a>
                <a class="nav-item" href="#" id="clients-nav" data-section="clients">
                    <i class="bi bi-pc-display"></i>
                    <span>客户端列表</span>
                </a>
                <a class="nav-item" href="#" id="users-nav">
                    <i class="bi bi-people"></i>
                    <span>用户管理</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="current-user">
                    <i class="bi bi-person-circle"></i>
                    <div>
                        <div id="current-user-name">-</div>
                        <div id="current-user-role">-</div>
                    </div>
                </div>
                <button class="icon-text-button" id="logout-button" type="button">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>退出</span>
                </button>
            </div>
        </aside>

        <main class="main-panel">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="toast-stack" id="toast-stack"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
